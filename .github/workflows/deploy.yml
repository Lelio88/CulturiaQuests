name: Deploy to Production

# "on" quoté volontairement : non quoté, YAML l'interprète comme le booléen true, ce qui
# génère des exécutions "startup_failure" fantômes (croix rouge cosmétique) sur les pushs
# hors `release`. Quoté, GitHub lit correctement le déclencheur.
"on":
  push:
    branches: [release]
    # Un push doc-only (CLAUDE.md, docs/**, README…) ne doit pas déclencher un rebuild +
    # redéploiement complet du serveur. Sémantique GitHub : si TOUS les fichiers modifiés par
    # le push matchent `paths-ignore`, le workflow est ignoré ; un push mixte (code + .md)
    # déclenche bien le deploy.
    paths-ignore:
      - '**.md'

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Pull latest code
            git fetch origin release
            git checkout release
            git pull origin release

            # .env.production est généré UNE SEULE FOIS au premier déploiement (secrets aléatoires
            # créés directement sur le serveur, jamais versionnés). Le CI ne le régénère PAS : le
            # régénérer depuis des secrets GitHub écraserait les clés en place (ENCRYPTION_KEY, etc.)
            # et casserait la prod (données chiffrées illisibles, sessions invalidées).
            if [ ! -f .env.production ]; then
              echo "ERREUR: .env.production absent sur le serveur."
              echo "Le générer une fois (cf. INFRASTRUCTURE.md / install-prod.sh) avant d'activer le CI."
              exit 1
            fi

            # Pendant le run d'import POI France, le build (nuxt build ~2-4 Go) tournait en
            # concurrence avec Ollama mistral (~4,4 Go chargés par l'import) sur le serveur 8 Go
            # → swap-thrashing, serveur injoignable, health check en timeout, prod DOWN (incident
            # 2026-07-04). On libère donc les ressources AVANT le build. Ce bloc ne s'exécute QUE si
            # l'import tourne (conteneur cq-import présent) → aucun effet sur un déploiement normal.
            # Ollama est redémarré par `up -d` ; l'import est repris par le trap EXIT (filet de
            # sécurité : reprise garantie même en cas d'échec du build ou de timeout du health check).
            if [ -n "$(docker ps -q -f name=cq-import)" ]; then
              echo "Import POI détecté → libération des ressources pour le build"
              trap 'docker unpause cq-import >/dev/null 2>&1 && echo "Import POI repris" || true' EXIT
              docker pause cq-import >/dev/null 2>&1 && echo "  import POI en pause" || true
              OLLAMA_CID=$(docker ps -q -f name=ollama)
              [ -n "$OLLAMA_CID" ] && docker stop "$OLLAMA_CID" >/dev/null 2>&1 && echo "  Ollama arrêté (RAM libérée)" || true
            fi

            # Build and restart services (réutilise le .env.production présent sur le serveur)
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

            # Wait for Strapi to be ready
            echo "Waiting for Strapi to start..."
            RETRIES=60
            until curl -sf http://127.0.0.1:1337/_health > /dev/null 2>&1; do
              RETRIES=$((RETRIES - 1))
              if [ "$RETRIES" -le 0 ]; then
                echo "WARNING: Strapi health check timed out"
                exit 1
              fi
              sleep 3
            done
            echo "Strapi is ready!"
