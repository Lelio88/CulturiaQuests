name: Deploy to Production

# "on" quoté volontairement : non quoté, YAML l'interprète comme le booléen true, ce qui
# génère des exécutions "startup_failure" fantômes (croix rouge cosmétique) sur les pushs
# hors `release`. Quoté, GitHub lit correctement le déclencheur.
"on":
  push:
    branches: [release]

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    # Le contexte `secrets` est INTERDIT dans les conditions `if:` (c'est ce qui provoquait le
    # startup_failure du workflow). On mappe le webhook en variable d'env (autorisée dans `if:`).
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Pull latest code
            git fetch origin release
            git checkout release
            git pull origin release

            # .env.production est généré UNE SEULE FOIS au premier déploiement (secrets aléatoires
            # créés directement sur le serveur, jamais versionnés). Le CI ne le régénère PAS : le
            # régénérer depuis des secrets GitHub écraserait les clés en place (ENCRYPTION_KEY, etc.)
            # et casserait la prod (données chiffrées illisibles, sessions invalidées).
            if [ ! -f .env.production ]; then
              echo "ERREUR: .env.production absent sur le serveur."
              echo "Le générer une fois (cf. INFRASTRUCTURE.md / install-prod.sh) avant d'activer le CI."
              exit 1
            fi

            # Build and restart services (réutilise le .env.production présent sur le serveur)
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

            # Wait for Strapi to be ready
            echo "Waiting for Strapi to start..."
            RETRIES=60
            until curl -sf http://127.0.0.1:1337/_health > /dev/null 2>&1; do
              RETRIES=$((RETRIES - 1))
              if [ "$RETRIES" -le 0 ]; then
                echo "WARNING: Strapi health check timed out"
                exit 1
              fi
              sleep 3
            done
            echo "Strapi is ready!"

      - name: Notify Discord (success)
        if: success() && env.DISCORD_WEBHOOK_URL != ''
        uses: appleboy/discord-action@v1
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          message: "CulturiaQuests deployed successfully from `release` branch."

      - name: Notify Discord (failure)
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        uses: appleboy/discord-action@v1
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          message: "CulturiaQuests deployment FAILED from `release` branch."
