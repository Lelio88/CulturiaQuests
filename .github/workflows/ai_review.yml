name: AI Code Review

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai_review:
    runs-on: ubuntu-latest
    # Exclure les branches automatiques (dependabot, renovate, etc.)
    if: |
      !startsWith(github.ref_name, 'dependabot/') &&
      !startsWith(github.ref_name, 'renovate/') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]')

    permissions:
      contents: read
      pull-requests: write

    steps:
      # Garde : si OPENAI_API_KEY n'est pas configurée, on saute proprement la review IA
      # (workflow VERT, aucun coût OpenAI) au lieu d'échouer. La review reprend automatiquement
      # dès que le secret est ajouté. (On n'expose pas la valeur, juste un booléen.)
      - name: Vérifier la présence de la clé OpenAI
        id: guard
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::notice::OPENAI_API_KEY absente — review IA ignorée (workflow vert)."
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.guard.outputs.has_key == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        if: steps.guard.outputs.has_key == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install dependencies
        if: steps.guard.outputs.has_key == 'true'
        run: pip install -r scripts/requirements.txt

      - name: Run AI Code Review
        if: steps.guard.outputs.has_key == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python scripts/ai_reviewer.py
