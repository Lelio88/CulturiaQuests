services:
  database:
    image: postgres:14-alpine
    container_name: postgres_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - strapi-data-prod:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: strapi_backend_prod
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      NODE_ENV: production
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:7b}
      # Timeout Ollama (ms) — l'inférence CPU peut être lente : prévoir large (cf. audit #4).
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-120000}
      # URL publique de Strapi derrière Caddy (server.url + liens e-mail). Cf. audit #8.
      PUBLIC_URL: ${NUXT_PUBLIC_STRAPI_URL}
      # Fuseau du process Node = Paris, cohérent avec le reste de l'app. Cf. audit #9.
      TZ: Europe/Paris
      # SMTP (reset password) — relais Brevo. Identifiants dans .env.production (jamais versionné).
      SMTP_HOST: ${SMTP_HOST:-smtp-relay.brevo.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_DEFAULT_FROM: ${SMTP_DEFAULT_FROM}
      SMTP_DEFAULT_REPLY_TO: ${SMTP_DEFAULT_REPLY_TO:-${SMTP_DEFAULT_FROM}}
    volumes:
      - ./backend/public/uploads:/opt/app/public/uploads
    ports:
      - "127.0.0.1:1337:1337"
    depends_on:
      database:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - app-network

  frontend:
    container_name: nuxt_frontend_prod
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      # SSR / BFF → Strapi en INTERNE (le proxy /api/strapi/* tape ici, côté serveur).
      NUXT_STRAPI_URL: http://backend:1337
      # URL PUBLIQUE de Strapi pour les médias côté client (images, avatars).
      # À définir dans .env.production (ex: https://api.<domaine>). Cf. DEPLOYMENT.md.
      NUXT_PUBLIC_STRAPI_URL: ${NUXT_PUBLIC_STRAPI_URL}
      # En prod l'app est mobile-first ; le desktop reste bloqué hors /dashboard sauf override.
      NUXT_PUBLIC_ALLOW_DESKTOP: ${NUXT_PUBLIC_ALLOW_DESKTOP:-false}
    ports:
      # Exposé uniquement en local ; le reverse proxy (Caddy) termine le TLS et route le domaine.
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - app-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    # Entrypoint robuste (cf. audit #6) : `ollama serve` reste vivant même si le pull échoue
    # (pull best-effort, retenté à la demande) → plus de boucle de restart du conteneur.
    entrypoint: ["/bin/sh", "-c", "ollama serve & serve_pid=$$!; until ollama list >/dev/null 2>&1; do sleep 1; done; ollama pull ${OLLAMA_MODEL:-mistral:7b} || echo '[ollama] pull echoue - sera retente a la demande'; wait $$serve_pid"]
    volumes:
      - ollama-data:/root/.ollama
    # Aucun mapping de port hôte : Ollama n'est joignable que sur le réseau interne (backend),
    # jamais exposé publiquement (cf. audit sécurité — API LLM sans authentification).
    healthcheck:
      # Sain uniquement quand le modèle est réellement présent (cf. audit #6).
      test: ["CMD-SHELL", "ollama list | grep -q '${OLLAMA_MODEL:-mistral:7b}' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 600s
    networks:
      - app-network

volumes:
  strapi-data-prod:
  ollama-data:

networks:
  app-network:
    driver: bridge
